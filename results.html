<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results - BusDZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body id="page-results">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="brand">🚌 Bus<span class="accent">DZ</span></div>
    <div class="nav-actions">
      <button id="themeToggle" class="theme-toggle">🌙</button>
      <a href="index.html" class="btn ghost">🏠 Accueil</a>
      <a href="network.html" class="btn ghost">🗺️ Réseau</a>
      <a id="adminLink" href="admin.html" class="btn ghost" data-role-required="admin" style="display:none;">👨‍💼 Admin</a>
    </div>
  </nav>

  <main class="container">
    <!-- Search Summary & Filters -->
    <section class="search-head">
      <div id="searchSummary"></div>
      <div class="filters">
        <label>
          <span>🏢 Company</span>
          <select id="filterCompany"><option value="all">All Companies</option></select>
        </label>
        <label>
          <span>📊 Sort By</span>
          <select id="sortBy">
            <option value="default">Recommended</option>
            <option value="priceAsc">💰 Price: Low → High</option>
            <option value="priceDesc">💰 Price: High → Low</option>
            <option value="timeAsc">🕐 Departure: Early → Late</option>
          </select>
        </label>
      </div>
    </section>

    <!-- Results Grid -->
    <section id="resultsList" class="results grid"></section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin-auth.js"></script>

  <script>
    /**
     * Secret Admin Shortcut: Press A + D + M in sequence (within 3 seconds)
     */
    (function() {
      const SECRET_KEYS = ['a', 'd', 'm'];
      let keySequence = [];
      const TIMEOUT = 3000;
      let timeoutId = null;

      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (!SECRET_KEYS.includes(key)) return;

        keySequence.push(key);
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => { keySequence = []; }, TIMEOUT);

        if (keySequence.length === SECRET_KEYS.length) {
          if (keySequence.join('') === SECRET_KEYS.join('')) {
            const adminLink = document.getElementById('adminLink');
            if (adminLink) {
              adminLink.style.display = 'inline-block';
              adminLink.style.opacity = '0.5';
              setTimeout(() => { adminLink.style.opacity = '1'; }, 300);
              console.log('✨ Admin button revealed!');
            }
            keySequence = [];
            clearTimeout(timeoutId);
          }
        }
      });
    })();
  </script>
</body>
</html>
