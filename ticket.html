<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Ticket - BusDZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <style>
    @media print {
      body { background: white; }
      .navbar { display: none; }
      .ticket-actions { display: none; }
      .ticket { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body id="page-ticket">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="brand">🚌 Bus<span class="accent">DZ</span></div>
    <div class="nav-actions">
      <button id="themeToggle" class="theme-toggle">🌙</button>
      <a href="index.html" class="btn ghost">🏠 Accueil</a>
      <a href="network.html" class="btn ghost">🗺️ Réseau</a>
      <a id="adminLink" href="admin.html" class="btn ghost" data-role-required="admin" style="display:none;">👨‍💼 Admin</a>
    </div>
  </nav>

  <main class="container">
    <section id="ticketWrap" class="ticket-wrap">
      <h2>✅ Booking Confirmed!</h2>
      <p style="text-align: center; color: var(--muted); margin-bottom: 2rem;">Your ticket has been generated. Keep this for your journey.</p>
      <div id="ticketCard"></div>
      <div class="ticket-actions">
        <button id="downloadTicket" class="btn primary">🖨️ Print / Download Ticket</button>
        <a href="index.html" class="btn ghost">← Back to Home</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin-auth.js"></script>
</body>
</html>
